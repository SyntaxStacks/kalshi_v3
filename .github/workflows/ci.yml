name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env
        run: |
          cp .env.example .env
          printf "unused\n" > ops/ci-dummy-key.pem
          printf "\nKALSHI_PRIVATE_KEY_PATH=./ops/ci-dummy-key.pem\n" >> .env
      - name: Boot compose stack
        run: docker compose up -d --build
      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs api
          exit 1
      - name: Verify runtime and metrics
        run: |
          curl -fsS http://127.0.0.1:8080/v1/runtime
          curl -fsS http://127.0.0.1:8080/metrics | grep "kalshi_v3_worker_up"
          curl -fsS http://127.0.0.1:9091/api/v1/targets | grep "\"health\":\"up\""
      - name: Shutdown compose stack
        if: always()
        run: docker compose down -v
